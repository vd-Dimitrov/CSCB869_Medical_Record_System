<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org" lang="en">
<head th:replace="~{fragments/layout :: head('Error – MedRecords')}"></head>
<body>
<div th:replace="~{fragments/navbar :: navbar}"></div>
<div class="page-wrapper">
    <div class="container-lg">
        <div class="error-wrapper">
            <div class="text-center">
                <div class="error-code" th:text="${statusCode}">Error</div>
                <h2 style="font-size:1.2rem;font-weight:600;margin:.75rem 0 .5rem">Something went wrong</h2>
                <p class="error-message mx-auto mb-4" th:text="${errorMessage}">An unexpected error occurred.</p>
                <a th:href="@{/}" class="btn btn-primary px-4">
                    <i class="bi bi-house me-2"></i>Go Home
                </a>
            </div>
        </div>
    </div>
</div>
<th:block th:replace="~{fragments/layout :: scripts}"></th:block>
</body>
</html>
