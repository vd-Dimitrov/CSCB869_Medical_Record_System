<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org" lang="en">
<head th:replace="~{fragments/layout :: head('Diagnosis Form – MedRecords')}"></head>
<body>
<div th:replace="~{fragments/navbar :: navbar}"></div>
<div class="page-wrapper">
    <div class="container-form">
        <div class="card form-card">
            <div class="card-header-bar">
                <i class="bi bi-journal-plus icon-muted"></i>
                <h2 th:text="${diagnosisDto.id == null ? 'New Diagnosis' : 'Edit Diagnosis'}"></h2>
            </div>
            <div class="card-body">
                <form th:action="${diagnosisDto.id == null ? '/diagnoses/new' : '/diagnoses/' + diagnosisDto.id + '/edit'}"
                      th:object="${diagnosisDto}" method="post">
                    <div class="mb-3">
                        <label class="form-label">Name</label>
                        <input type="text" th:field="*{name}" class="form-control"
                               th:classappend="${#fields.hasErrors('name')} ? 'is-invalid'"
                               placeholder="Diagnosis name">
                        <div class="invalid-feedback" th:errors="*{name}"></div>
                    </div>
                    <div class="mb-3">
                        <label class="form-label">Description</label>
                        <textarea th:field="*{description}" class="form-control" rows="4"
                                  placeholder="Clinical description..."></textarea>
                    </div>
                    <div class="form-actions">
                        <button type="submit" class="btn-save">Save Diagnosis</button>
                        <a th:href="@{/diagnoses}" class="btn-cancel">Cancel</a>
                    </div>
                </form>
            </div>
        </div>
    </div>
</div>
<th:block th:replace="~{fragments/layout :: scripts}"></th:block>
</body>
</html>
