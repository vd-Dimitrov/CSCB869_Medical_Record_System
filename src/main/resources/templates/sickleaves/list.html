<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org"
      xmlns:sec="http://www.thymeleaf.org/extras/spring-security" lang="en">
<head th:replace="~{fragments/layout :: head('Sick Leaves – MedRecords')}"></head>
<body>
<div th:replace="~{fragments/navbar :: navbar}"></div>
<div class="page-wrapper">
    <div class="container-lg">
        <div class="page-header">
            <h1 class="page-title"><i class="bi bi-file-medical me-2 icon-warning"></i>Sick Leaves</h1>
        </div>
        <div class="card">
            <table class="table data-table">
                <thead>
                <tr><th>Patient</th><th>Doctor</th><th>Start Date</th><th>Duration (days)</th><th>Actions</th></tr>
                </thead>
                <tbody>
                <tr th:each="sl : ${sickLeaves}">
                    <td th:text="${sl.patient.name}"></td>
                    <td th:text="${sl.doctor.name}"></td>
                    <td th:text="${sl.startDate}"></td>
                    <td th:text="${sl.durationDays}"></td>
                    <td class="d-flex gap-2 flex-wrap">
                        <form th:action="@{/sickleaves/{id}/delete(id=${sl.id})}" method="post" class="d-inline"
                              onsubmit="return confirm('Delete this sick leave?');" sec:authorize="hasRole('ADMIN')">
                            <button type="submit" class="btn-action-delete">
                                <i class="bi bi-trash"></i>Delete
                            </button>
                        </form>
                    </td>
                </tr>
                <tr th:if="${#lists.isEmpty(sickLeaves)}">
                    <td colspan="5" class="table-empty">No sick leaves found.</td>
                </tr>
                </tbody>
            </table>
        </div>
    </div>
</div>
<th:block th:replace="~{fragments/layout :: scripts}"></th:block>
</body>
</html>
