<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org" lang="en">
<head th:replace="~{fragments/layout :: head('User Form – MedRecords')}"></head>
<body>
<div th:replace="~{fragments/navbar :: navbar}"></div>
<div class="page-wrapper">
    <div class="container-form">
        <div class="card form-card">
            <div class="card-header-bar">
                <i class="bi bi-person-gear icon-danger"></i>
                <h2 th:text="${userDto.id == null ? 'New User' : 'Edit User'}"></h2>
            </div>
            <div class="card-body">
                <form th:action="${userDto.id == null ? '/admin/new' : '/admin/' + userDto.id + '/edit'}"
                      th:object="${userDto}" method="post">
                    <div class="mb-3">
                        <label class="form-label">Username</label>
                        <label>
                            <input type="text" th:field="*{username}" class="form-control"
                                   th:classappend="${#fields.hasErrors('username')} ? 'is-invalid'"
                                   placeholder="Username">
                        </label>
                        <div class="invalid-feedback" th:errors="*{username}"></div>
                    </div>
                    <div class="mb-3">
                        <label class="form-label">
                            Password
                            <span th:if="${userDto.id != null}" class="ms-1 form-hint">
                                (leave blank to keep current)
                            </span>
                        </label>
                        <label>
                            <input type="password" th:field="*{password}" class="form-control"
                                   th:classappend="${#fields.hasErrors('password')} ? 'is-invalid'"
                                   placeholder="Password">
                        </label>
                        <div class="invalid-feedback" th:errors="*{password}"></div>
                    </div>
                    <div class="mb-3">
                        <label class="form-label">Role</label>
                        <label for="roleSelect"></label><select th:field="*{role}" class="form-select" id="roleSelect" onchange="updateLinkedFields()">
                            <option value="">-- Select role --</option>
                            <option th:each="r : ${roles}" th:value="${r}" th:text="${r}"></option>
                        </select>
                    </div>
                    <div class="mb-3 hidden" id="doctorField">
                        <label class="form-label">Link to Doctor</label>
                        <label>
                            <select th:field="*{doctorId}" class="form-select">
                                <option value="">-- None --</option>
                                <option th:each="d : ${doctors}" th:value="${d.id}" th:text="${d.name}"></option>
                            </select>
                        </label>
                    </div>
                    <div class="mb-3 hidden" id="patientField">
                        <label class="form-label">Link to Patient</label>
                        <label>
                            <select th:field="*{patientId}" class="form-select">
                                <option value="">-- None --</option>
                                <option th:each="p : ${patients}" th:value="${p.id}" th:text="${p.name}"></option>
                            </select>
                        </label>
                    </div>
                    <div class="form-actions">
                        <button type="submit" class="btn-save">Save User</button>
                        <a th:href="@{/admin}" class="btn-cancel">Cancel</a>
                    </div>
                </form>
            </div>
        </div>
    </div>
</div>
<th:block th:replace="~{fragments/layout :: scripts}"></th:block>
<script>
    function updateLinkedFields() {
        const role = document.getElementById('roleSelect').value;
        document.getElementById('doctorField').classList.toggle('hidden', role !== 'DOCTOR');
        document.getElementById('patientField').classList.toggle('hidden', role !== 'PATIENT');
    }
    updateLinkedFields();
</script>
</body>
</html>
