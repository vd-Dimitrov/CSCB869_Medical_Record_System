<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org"
      xmlns:sec="http://www.thymeleaf.org/extras/spring-security">
<head th:replace="~{fragments/layout :: head('Dashboard – MedRecords')}"></head>
<body>
<div th:replace="~{fragments/navbar :: navbar}"></div>
<div class="page-wrapper">
    <div class="container-lg">
        <div class="mb-4">
            <h1 class="page-title">Welcome, <span sec:authentication="name"></span></h1>
            <p class="text-muted mb-0" style="font-size:.875rem">
                Role: <span th:text="${role}" style="font-weight:600"></span>
            </p>
        </div>
        <div class="row g-3">
            <div class="col-sm-6 col-lg-4" sec:authorize="hasAnyRole('ADMIN','DOCTOR')">
                <a th:href="@{/doctors}" class="dash-card" style="--dash-accent:#0891b2">
                    <div class="dash-card-icon"><i class="bi bi-person-badge"></i></div>
                    <div class="dash-card-title">Doctors</div>
                    <div class="dash-card-link">View all <i class="bi bi-arrow-right"></i></div>
                </a>
            </div>
            <div class="col-sm-6 col-lg-4" sec:authorize="hasAnyRole('ADMIN','DOCTOR')">
                <a th:href="@{/patients}" class="dash-card" style="--dash-accent:#059669">
                    <div class="dash-card-icon"><i class="bi bi-people"></i></div>
                    <div class="dash-card-title">Patients</div>
                    <div class="dash-card-link">View all <i class="bi bi-arrow-right"></i></div>
                </a>
            </div>
            <div class="col-sm-6 col-lg-4">
                <a th:href="@{/checkups}" class="dash-card" style="--dash-accent:#7c3aed">
                    <div class="dash-card-icon"><i class="bi bi-clipboard2-pulse"></i></div>
                    <div class="dash-card-title">Check-ups</div>
                    <div class="dash-card-link">View all <i class="bi bi-arrow-right"></i></div>
                </a>
            </div>
            <div class="col-sm-6 col-lg-4">
                <a th:href="@{/sickleaves}" class="dash-card" style="--dash-accent:#d97706">
                    <div class="dash-card-icon"><i class="bi bi-file-medical"></i></div>
                    <div class="dash-card-title">Sick Leaves</div>
                    <div class="dash-card-link">View all <i class="bi bi-arrow-right"></i></div>
                </a>
            </div>
            <div class="col-sm-6 col-lg-4" sec:authorize="hasAnyRole('ADMIN','DOCTOR')">
                <a th:href="@{/diagnoses}" class="dash-card" style="--dash-accent:#64748b">
                    <div class="dash-card-icon"><i class="bi bi-journal-medical"></i></div>
                    <div class="dash-card-title">Diagnoses</div>
                    <div class="dash-card-link">View all <i class="bi bi-arrow-right"></i></div>
                </a>
            </div>
            <div class="col-sm-6 col-lg-4" sec:authorize="hasAnyRole('ADMIN','DOCTOR')">
                <a th:href="@{/statistics}" class="dash-card" style="--dash-accent:#dc2626">
                    <div class="dash-card-icon"><i class="bi bi-bar-chart-line"></i></div>
                    <div class="dash-card-title">Statistics</div>
                    <div class="dash-card-link">View reports <i class="bi bi-arrow-right"></i></div>
                </a>
            </div>
        </div>
    </div>
</div>
<th:block th:replace="~{fragments/layout :: scripts}"></th:block>
</body>
</html>
